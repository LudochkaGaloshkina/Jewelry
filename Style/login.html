<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <!-- Vue and application bootstrap loaded as ES modules -->
    <title>Diamond Blackstar</title>
</head>
<body>
    <h1>
        <img src="logo.png">
        <label id = "logoname">Diamond Blackstar</label>
    </h1>
    <div class="welcome">
    <span class="Welcome">Welcome!</span>
    <span class="psignin">please fill your information</span>
    </div>
    <main id="app">
      <form id="login" v-show="loginVisible">
        <div class="logins" id="loginform">
            <div class = container>
                <input type="email" id="email" name="email" placeholder="email">
                <span class="ph_left">&#9993</span>
            </div>
            <div class= "container">
                <input type="password" id="pass" name="pass" placeholder="password">
                <span class="ph_left">&#128274;</span>
            </div>
            <div class = "signin">
                <button @click="toggle" type="button" id="isaccreated">Don't have account?</button>
                <button type="button" id="Forgoturpass">Forgot your password?</button>
                <button type="submit" id="loginin"> Sign in now </button>
            </div>
            <!-- <div id = "loading"></div> -->
        </div>
      </form>


      <form id="register" v-show="registerVisible">
        <div class="reg" id="regform">
            <div class="container">
                <input type="text" id="user" name="user" placeholder="username">
                <span class="ph_left">&#128100</span>
            </div>
            <div class = container>
                <input type="email" id="email" name="email" placeholder="email">
                <span class="ph_left">&#9993</span>
            </div>
            <div class= "container">
                <input type="password" id="pass" name="pass" placeholder="password">
                <span class="ph_left">&#128274;</span>
            </div>
            <div class = "registration">
                <button @click="toggle" type="button" id="accnotcreated">Already have account?</button>
                <button type="submit" id="loginin"> Sign up now </button>
            </div>
        </div>
      </form>
    </main>

    <script type="module">
      import { createApp } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js';
      import { useVisibility } from '/script/script.js';

      createApp({
        setup: useVisibility
      }).mount('#app');
    </script>
</body>
</html>
